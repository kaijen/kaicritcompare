name: Release

on:
  push:
    tags:
      - 'v*'

# Allow the docs job to publish to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Build, test, and attach the .vsix artifact to the GitHub Release.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm test
      - run: npx --yes @vscode/vsce package
      - name: Publish .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'

  # Build the TypeDoc API docs and deploy them to GitHub Pages.
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm run docs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
