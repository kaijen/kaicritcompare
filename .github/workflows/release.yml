name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm run compile
      - run: npx --yes @vscode/vsce package
      - name: Publish .vsix to the release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
